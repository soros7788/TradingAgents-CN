name: TradingAgents Telegram Alert

on:
  workflow_dispatch:
  schedule:
    # 北京时间 09:35 = UTC 01:35
    - cron: "35 1 * * 1-5"
    # 北京时间 11:30 = UTC 03:30
    - cron: "30 3 * * 1-5"
    # 北京时间 14:30 = UTC 06:30
    - cron: "30 6 * * 1-5"

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Telegram test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e

          MSG="TradingAgents-CN 定时任务已运行
仓库：${GITHUB_REPOSITORY}
分支：${GITHUB_REF_NAME}
时间UTC：$(date -u '+%Y-%m-%d %H:%M:%S')
北京时间：$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')

当前版本：轻量提醒版
状态：GitHub Actions 可用
下一步：接入 A股等突破规则"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MSG"
