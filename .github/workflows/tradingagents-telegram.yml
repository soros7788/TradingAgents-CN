- name: Run breakout scan and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e

          python scripts/breakout_alert.py > msg.txt 2>&1
          CODE=$?

          echo "" >> msg.txt
          echo "退出码：$CODE" >> msg.txt

          echo "===== Message ====="
          cat msg.txt

          echo "===== Telegram response ====="
          RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$(cat msg.txt)")

          echo "$RESPONSE"

          echo "$RESPONSE" | grep '"ok":true'
