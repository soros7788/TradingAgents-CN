name: TradingAgents Telegram Alert

on:
  workflow_dispatch:
  schedule:
    - cron: "35 1 * * 1-5"
    - cron: "30 3 * * 1-5"
    - cron: "30 6 * * 1-5"

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e

          echo "TradingAgents-CN 定时任务已运行" > msg.txt
          echo "" >> msg.txt
          echo "仓库：${GITHUB_REPOSITORY}" >> msg.txt
          echo "分支：${GITHUB_REF_NAME}" >> msg.txt
          echo "UTC时间：$(date -u '+%Y-%m-%d %H:%M:%S')" >> msg.txt
          echo "北京时间：$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')" >> msg.txt
          echo "" >> msg.txt
          echo "当前版本：轻量提醒版" >> msg.txt
          echo "状态：GitHub Actions 可用" >> msg.txt
          echo "下一步：接入 A股等突破规则" >> msg.txt

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$(cat msg.txt)"
