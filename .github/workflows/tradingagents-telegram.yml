def market_symbol(code):
    code = str(code).zfill(6)

    if code.startswith(("600", "601", "603", "605", "688")):
        return "sh" + code

    return "sz" + code


def get_30m_kline_sina(code):
    """
    新浪 30分钟K线。
    用来绕开东方财富 / akshare 被 GitHub Actions 断连的问题。
    """
    symbol = market_symbol(code)

    url = (
        "https://quotes.sina.cn/cn/api/jsonp_v2.php/"
        "var%20KLC_ML=/CN_MinlineService.getMinlineData"
    )

    params = {
        "symbol": symbol,
        "scale": "30",
        "ma": "no",
        "datalen": "120",
    }

    headers = {
        "User-Agent": "Mozilla/5.0",
        "Referer": "https://finance.sina.com.cn/",
        "Accept": "*/*",
        "Connection": "close",
    }

    r = requests.get(url, params=params, headers=headers, timeout=30)
    r.raise_for_status()

    text = r.text

    start = text.find("[")
    end = text.rfind("]")

    if start == -1 or end == -1:
        raise RuntimeError("新浪接口返回格式异常")

    data = json.loads(text[start:end + 1])

    if not data:
        raise RuntimeError("新浪接口返回空K线")

    rows = []

    for x in data:
        rows.append({
            "时间": x.get("day"),
            "开盘": x.get("open"),
            "最高": x.get("high"),
            "最低": x.get("low"),
            "收盘": x.get("close"),
            "成交额": x.get("volume", 0),
        })

    df = pd.DataFrame(rows)

    need_cols = ["时间", "开盘", "收盘", "最高", "最低", "成交额"]

    for col in need_cols:
        if col not in df.columns:
            raise RuntimeError(f"新浪K线缺少字段：{col}")

    for col in ["开盘", "收盘", "最高", "最低", "成交额"]:
        df[col] = pd.to_numeric(df[col], errors="coerce")

    df = df.dropna(subset=["收盘", "最高", "最低"])
    df = df.tail(90).reset_index(drop=True)

    if len(df) < 60:
        raise RuntimeError(f"{PERIOD_NAME}K线不足60根，当前{len(df)}根")

    return df


def get_30m_kline_akshare(code):
    """
    akshare 备用。
    但它可能还是会被东方财富断开。
    """
    df = ak.stock_zh_a_hist_min_em(
        symbol=str(code).zfill(6),
        period=PERIOD,
        adjust="qfq"
    )

    if df is None or df.empty:
        raise RuntimeError("akshare返回空数据")

    need_cols = ["时间", "开盘", "收盘", "最高", "最低", "成交额"]

    for col in need_cols:
        if col not in df.columns:
            raise RuntimeError(f"K线缺少字段：{col}，当前字段：{list(df.columns)}")

    df = df[need_cols].copy()

    for col in ["开盘", "收盘", "最高", "最低", "成交额"]:
        df[col] = pd.to_numeric(df[col], errors="coerce")

    df = df.dropna(subset=["收盘", "最高", "最低"])
    df = df.tail(90).reset_index(drop=True)

    if len(df) < 60:
        raise RuntimeError(f"{PERIOD_NAME}K线不足60根，当前{len(df)}根")

    return df


def get_30m_kline(code):
    """
    最稳顺序：
    1. 新浪 30分钟K
    2. akshare 备用
    """
    code = str(code).zfill(6)

    errors = []

    for i in range(3):
        try:
            time.sleep(2 + i)
            return get_30m_kline_sina(code)
        except Exception as e:
            errors.append(f"新浪第{i + 1}次失败：{type(e).__name__}: {e}")
            print(errors[-1])
            time.sleep(3 + i * 2)

    for i in range(3):
        try:
            time.sleep(2 + i)
            return get_30m_kline_akshare(code)
        except Exception as e:
            errors.append(f"akshare第{i + 1}次失败：{type(e).__name__}: {e}")
            print(errors[-1])
            time.sleep(3 + i * 2)

    raise RuntimeError("30分钟K线获取失败：" + "；".join(errors[-4:]))
