name: TradingAgents Telegram Alert

on:
  workflow_dispatch:

  schedule:
    # 北京时间 09:35
    - cron: "35 1 * * 1-5"

    # 北京时间 11:30
    - cron: "30 3 * * 1-5"

    # 北京时间 14:30
    - cron: "30 6 * * 1-5"

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: Run 30m breakout scan and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cat > scan.py <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import time
          import traceback
          import requests
          import pandas as pd
          import akshare as ak

          # =========================
          # 股票列表：按你截图
          # =========================
          WATCHLIST = [
              {"code": "600006", "name": "东风股份"},
              {"code": "002463", "name": "沪电股份"},
          ]

          # =========================
          # 策略参数
          # =========================
          TOL = 0.01          # 高低点允许 1% 误差
          BREAK_BUF = 0.003  # 突破缓冲 0.3%
          FAIL_BUF = 0.01    # 证伪缓冲 1%

          PERIOD = "30"
          PERIOD_NAME = "30分钟"

          def now_bj():
              return datetime.now(ZoneInfo("Asia/Shanghai")).strftime("%Y-%m-%d %H:%M:%S")

          def near(a, b, tol=TOL):
              if a <= 0 or b <= 0:
                  return False
              return abs(a - b) / max(a, b) <= tol

          def is_scan_range(code, name):
              """
              扫描范围：
              沪主板：600 / 601 / 603 / 605
              深主板：000 / 001 / 002 / 003
              创业板：300 / 301
              科创板：688
              排除 ST
              """
              if "ST" in name.upper():
                  return False

              return code.startswith((
                  "600", "601", "603", "605",
                  "000", "001", "002", "003",
                  "300", "301",
                  "688"
              ))

          def get_30m_kline(code):
              """
              最简单修法：
              不再手写东方财富接口。
              改用 akshare 获取 30分钟 K线。
              """
              code = str(code).zfill(6)
              last_error = None

              for i in range(5):
                  try:
                      time.sleep(2 + i)

                      df = ak.stock_zh_a_hist_min_em(
                          symbol=code,
                          period=PERIOD,
                          adjust="qfq"
                      )

                      if df is None or df.empty:
                          raise RuntimeError("akshare返回空数据")

                      need_cols = ["时间", "开盘", "收盘", "最高", "最低", "成交额"]

                      for col in need_cols:
                          if col not in df.columns:
                              raise RuntimeError(f"K线缺少字段：{col}，当前字段：{list(df.columns)}")

                      df = df[need_cols].copy()

                      for col in ["开盘", "收盘", "最高", "最低", "成交额"]:
                          df[col] = pd.to_numeric(df[col], errors="coerce")

                      df = df.dropna(subset=["收盘", "最高", "最低"])
                      df = df.tail(90).reset_index(drop=True)

                      if len(df) < 60:
                          raise RuntimeError(f"{PERIOD_NAME}K线不足60根，当前{len(df)}根")

                      return df

                  except Exception as e:
                      last_error = e
                      print(f"{code} 第{i + 1}次获取K线失败：{type(e).__name__}: {e}")
                      time.sleep(3 + i * 2)

              raise RuntimeError(f"akshare 30分钟K线连续失败5次：{last_error}")

          def analyze(code, name):
              code = str(code).zfill(6)

              if not is_scan_range(code, name):
                  return {
                      "code": code,
                      "name": name,
                      "status": "过滤",
                      "reason": "不在当前扫描范围，或为ST股票"
                  }

              df = get_30m_kline(code)

              current = float(df["收盘"].iloc[-1])
              last_time = str(df["时间"].iloc[-1])

              h5 = float(df["最高"].tail(5).max())
              h20 = float(df["最高"].tail(20).max())
              h60 = float(df["最高"].tail(60).max())

              l2 = float(df["最低"].tail(2).min())
              l5 = float(df["最低"].tail(5).min())

              amount = float(df["成交额"].iloc[-1]) / 100000000

              # A：5根最高≈20根最高≈60根最高
              A = near(h5, h20) and near(h20, h60)

              # B：近2根最低≈近5根最低
              B = near(l2, l5)

              # D：当前收盘价突破60根结构高点
              D = current > h60 * (1 + BREAK_BUF)

              # F：当前收盘价跌破近5根低点，视为证伪
              F = current < l5 * (1 - FAIL_BUF)

              if F:
                  status = "证伪"
                  reason = f"{PERIOD_NAME}收盘价 {current:.2f} 跌破支撑 {l5:.2f}"
              elif A and B and D:
                  status = "突破"
                  reason = f"{PERIOD_NAME}收盘价 {current:.2f} 突破结构高点 {h60:.2f}"
              elif A and B:
                  status = "等待"
                  reason = f"{PERIOD_NAME}结构有效，等待突破 {h60:.2f}"
              elif A:
                  status = "观察"
                  reason = "高点压缩存在，但低点承接不足"
              else:
                  status = "未成型"
                  reason = f"不满足{PERIOD_NAME}K的5/20/60高点重合"

              return {
                  "code": code,
                  "name": name,
                  "status": status,
                  "reason": reason,
                  "price": current,
                  "last_time": last_time,
                  "amount": amount,
                  "A": A,
                  "B": B,
                  "D": D,
                  "F": F,
                  "h5": h5,
                  "h20": h20,
                  "h60": h60,
                  "l2": l2,
                  "l5": l5,
              }

          results = []

          for item in WATCHLIST:
              try:
                  results.append(analyze(item["code"], item["name"]))
              except Exception as e:
                  traceback.print_exc()
                  results.append({
                      "code": item["code"],
                      "name": item["name"],
                      "status": "ERROR",
                      "reason": f"{type(e).__name__}: {e}",
                  })

          lines = []
          lines.append("A股等突破自动扫描")
          lines.append(f"模型周期：{PERIOD_NAME}K")
          lines.append(f"时间：{now_bj()}")
          lines.append("")
          lines.append(f"突破：{sum(r['status'] == '突破' for r in results)}")
          lines.append(f"等待：{sum(r['status'] == '等待' for r in results)}")
          lines.append(f"证伪：{sum(r['status'] == '证伪' for r in results)}")
          lines.append(f"观察：{sum(r['status'] == '观察' for r in results)}")
          lines.append(f"未成型：{sum(r['status'] == '未成型' for r in results)}")
          lines.append(f"错误：{sum(r['status'] == 'ERROR' for r in results)}")
          lines.append("")

          for r in results:
              lines.append(f"{r['code']} {r['name']}｜{r['status']}")
              lines.append(f"原因：{r['reason']}")

              if "price" in r:
                  lines.append(f"K线时间：{r['last_time']}")
                  lines.append(f"价格：{r['price']:.2f}｜成交额：{r['amount']:.2f}亿")
                  lines.append(f"A高点重合：{r['A']}｜B低点承接：{r['B']}｜D突破：{r['D']}｜证伪：{r['F']}")
                  lines.append(f"5高：{r['h5']:.2f}｜20高：{r['h20']:.2f}｜60高：{r['h60']:.2f}")
                  lines.append(f"2低：{r['l2']:.2f}｜5低：{r['l5']:.2f}")

              lines.append("")

          lines.append("规则：")
          lines.append(f"A：5根{PERIOD_NAME}最高≈20根{PERIOD_NAME}最高≈60根{PERIOD_NAME}最高")
          lines.append(f"B：近2根{PERIOD_NAME}最低≈近5根{PERIOD_NAME}最低")
          lines.append("C：沪深主板 + 创业板 + 科创板，非ST")
          lines.append(f"D：当前{PERIOD_NAME}收盘价突破结构高点")
          lines.append("")
          lines.append("提示：仅用于策略观察，不构成投资建议。")

          print("\n".join(lines))
          PY

          python scan.py > msg_full.txt 2>&1
          CODE=$?

          {
            echo "A股等突破扫描结果"
            echo "退出码：$CODE"
            echo "北京时间：$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            tail -c 3500 msg_full.txt
          } > msg.txt

          echo "===== Telegram Message ====="
          cat msg.txt

          RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$(cat msg.txt)")

          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"ok":true'
