name: TradingAgents Telegram Only

on:
  schedule:
    # 北京时间 09:35
    - cron: "35 1 * * 1-5"

    # 北京时间 10:05、10:35
    - cron: "5,35 2 * * 1-5"

    # 北京时间 11:05、11:35
    - cron: "5,35 3 * * 1-5"

    # 北京时间 13:05、13:35
    - cron: "5,35 5 * * 1-5"

    # 北京时间 14:05、14:35
    - cron: "5,35 6 * * 1-5"

  workflow_dispatch:
    inputs:
      stocks:
        description: "股票代码，逗号分隔，如：000001,002463,000006"
        required: false
        default: "002463,000006"
      kline_period:
        description: "K线周期"
        required: false
        type: choice
        options:
          - 15m
          - 30m
          - 60m
        default: "15m"
      signal_mode:
        description: "信号模式"
        required: false
        type: choice
        options:
          - strict
          - balanced
          - relaxed
        default: "balanced"
      analysis_type:
        description: "分析类型"
        required: false
        type: choice
        options:
          - quick
          - full
        default: "quick"

permissions:
  contents: read

jobs:
  telegram-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      STOCKS: ${{ github.event.inputs.stocks || '000001,002463,000006' }}
      KLINE_PERIOD: ${{ github.event.inputs.kline_period || '15m' }}
      SIGNAL_MODE: ${{ github.event.inputs.signal_mode || 'balanced' }}
      ANALYSIS_TYPE: ${{ github.event.inputs.analysis_type || 'quick' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install requests aiohttp pandas numpy scikit-learn python-telegram-bot

      - name: Run trading analysis
        id: run_analysis
        continue-on-error: true
        run: |
          set +e

          echo "====== TradingAgents Telegram Only ======" > run.log
          echo "Time UTC: $(date -u '+%Y-%m-%d %H:%M:%S')" >> run.log
          echo "Stocks: $STOCKS" >> run.log
          echo "Kline Period: $KLINE_PERIOD" >> run.log
          echo "Signal Mode: $SIGNAL_MODE" >> run.log
          echo "Analysis Type: $ANALYSIS_TYPE" >> run.log
          echo "" >> run.log

          if [ -f scripts/sync_stock_data.py ]; then
            echo "====== Sync stock data ======" >> run.log
            python scripts/sync_stock_data.py --date today >> run.log 2>&1
          else
            echo "scripts/sync_stock_data.py 不存在，跳过同步。" >> run.log
          fi

          echo "" >> run.log
          echo "====== Run analysis ======" >> run.log

          if [ -f scripts/trading_analysis_main.py ]; then
            python scripts/trading_analysis_main.py \
              --stocks "$STOCKS" \
              --period "$KLINE_PERIOD" \
              --signal-mode "$SIGNAL_MODE" \
              --analysis_type "$ANALYSIS_TYPE" \
              --output json \
              > result.json 2>> run.log
            CODE=$?
          else
            echo "❌ 找不到 scripts/trading_analysis_main.py" >> run.log
            CODE=127
          fi

          echo "$CODE" > exit_code.txt

          echo "" >> run.log
          echo "Exit code: $CODE" >> run.log

          exit 0

      - name: Build Telegram message
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          bj = datetime.now(timezone.utc) + timedelta(hours=8)

          def yesno(v):
              return "✅" if v else "❌"

          def fmt_pct(v):
              if v is None:
                  return "-"
              try:
                  return f"{float(v):+.2f}%"
              except Exception:
                  return str(v)

          def signal_cn(sig):
              return {
                  "BREAKOUT": "🚀 已突破",
                  "WATCH": "👀 等突破",
                  "WEAK_BREAKOUT": "⚠️ 弱突破",
                  "NONE": "— 未触发",
              }.get(sig, sig or "-")

          msg = []
          if not Path("result.json").exists() or Path("result.json").stat().st_size == 0:
              log = Path("run.log").read_text(encoding="utf-8", errors="ignore") if Path("run.log").exists() else ""
              msg.append("⚠️ 本次没有生成分析结果。")
              msg.append("")
              msg.append("运行日志尾部：")
              msg.append("\n".join(log.splitlines()[-80:]))
              Path("telegram_message.txt").write_text("\n".join(msg)[:12000], encoding="utf-8")
              raise SystemExit(0)

          raw = Path("result.json").read_text(encoding="utf-8", errors="ignore")

          try:
              data = json.loads(raw)
          except Exception:
              msg.append("⚠️ result.json 解析失败，原始输出如下：")
              msg.append(raw[:10000])
              Path("telegram_message.txt").write_text("\n".join(msg)[:12000], encoding="utf-8")
              raise SystemExit(0)

          summary = data.get("summary", {})
          total = summary.get("total", 0)
          ok = summary.get("ok", 0)
          errors = summary.get("errors", 0)
          period = data.get("period", "15m")
          signal_mode = data.get("signal_mode", "balanced")
          title = data.get("title", "TradingAgents-CN 突破扫描")
          candidates = data.get("candidates", [])
          all_results = data.get("all_results", [])
          err_list = data.get("errors", [])

          msg.append(f"📈 {title}")
          msg.append(f"⏰ 北京时间：{bj:%Y-%m-%d %H:%M:%S}")
          msg.append(f"周期：{period}｜模式：{signal_mode}")
          msg.append("")

          msg.append(f"📊 扫描：{total} 只")
          msg.append(f"✅ 成功：{ok} 只")
          msg.append(f"❌ 异常：{errors} 只")
          msg.append(f"🎯 候选：{len(candidates)} 只")
          msg.append("")

          if candidates:
              msg.append("🔥 候选股票")
              for x in candidates:
                  code = x.get("code", "-")
                  sig = signal_cn(x.get("signal"))
                  price = x.get("last_price", "-")
                  high = x.get("structure_high_60", "-")
                  bp = fmt_pct(x.get("breakout_pct"))
                  score = x.get("score", "-")
                  decision = x.get("decision", "-")
                  cond = x.get("conditions", {})

                  msg.append(f"{code}｜{sig}｜得分 {score}")
                  msg.append(f"现价 {price}｜结构高点 {high}｜距突破 {bp}")
                  msg.append(
                      f"A高点共振 {yesno(cond.get('A_high_resonance_5_20_60'))} "
                      f"B低点抬高 {yesno(cond.get('B_low_not_breaking_2_vs_5'))} "
                      f"D突破 {yesno(cond.get('D_price_above_structure_high'))}"
                  )
                  msg.append(f"结论：{decision}")
                  msg.append("")
          else:
              msg.append("🎯 本次没有触发候选。")
              msg.append("")

          if all_results:
              msg.append("📋 明细")
              for x in all_results:
                  code = x.get("code", "-")
                  sig = signal_cn(x.get("signal"))
                  price = x.get("last_price", "-")
                  high = x.get("structure_high_60", "-")
                  bp = fmt_pct(x.get("breakout_pct"))
                  score = x.get("score", "-")
                  source = x.get("data_source", "-")
                  latest_time = x.get("latest_time", "-")
                  cond = x.get("conditions", {})

                  msg.append(f"{code}｜{sig}｜得分 {score}")
                  msg.append(f"现价 {price}｜结构高点 {high}｜距突破 {bp}")
                  msg.append(
                      f"A {yesno(cond.get('A_high_resonance_5_20_60'))} "
                      f"B {yesno(cond.get('B_low_not_breaking_2_vs_5'))} "
                      f"D {yesno(cond.get('D_price_above_structure_high'))}"
                  )
                  msg.append(f"数据源：{source}｜K线时间：{latest_time}")
                  msg.append("")

          if err_list:
              msg.append("⚠️ 异常")
              for e in err_list[:8]:
                  msg.append(f"{e.get('code', '-')}: {e.get('error', '-')}")
              msg.append("")

          msg.append("规则：")
          msg.append("A = 5/20/60 高点共振")
          msg.append("B = 近2根低点不破近5根低点（按模式可放宽）")
          msg.append("D = 当前价突破60根结构高点（按模式可放宽）")

          Path("telegram_message.txt").write_text("\n".join(msg)[:12000], encoding="utf-8")
          PY

      - name: Send Telegram
        run: |
          python - <<'PY'
          import os
          import requests
          from pathlib import Path

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()

          if not token or not chat_id:
              raise SystemExit("缺少 TELEGRAM_BOT_TOKEN 或 TELEGRAM_CHAT_ID")

          text = Path("telegram_message.txt").read_text(encoding="utf-8", errors="ignore")
          url = f"https://api.telegram.org/bot{token}/sendMessage"

          chunks = [text[i:i+3800] for i in range(0, len(text), 3800)]

          for chunk in chunks:
              payload = {
                  "chat_id": chat_id,
                  "text": chunk,
                  "disable_web_page_preview": True
              }
              r = requests.post(url, json=payload, timeout=30)
              if not r.ok:
                  raise SystemExit(f"Telegram 发送失败: {r.status_code} {r.text}")

          print("Telegram sent.")
          PY
