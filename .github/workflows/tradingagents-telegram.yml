name: TradingAgents Telegram Alert

on:
  workflow_dispatch:
  schedule:
    # 北京时间 09:35
    - cron: "35 1 * * 1-5"
    # 北京时间 11:30
    - cron: "30 3 * * 1-5"
    # 北京时间 14:30
    - cron: "30 6 * * 1-5"

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests akshare

      - name: Run 30m breakout scan and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cat > scan.py <<'PY'
          import time
          import pandas as pd
          import requests
          import akshare as ak
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          WATCHLIST = [
              {"code": "600006", "name": "东风股份"},
              {"code": "002463", "name": "沪电股份"},
          ]

          PERIOD_NAME = "30分钟"
          PERIOD = "30"

          def market_symbol(code):
              code = str(code).zfill(6)
              if code.startswith(("600","601","603","605","688")):
                  return "sh" + code
              return "sz" + code

          def get_30m_kline_sina(code):
              symbol = market_symbol(code)
              url = (
                  "https://quotes.sina.cn/cn/api/jsonp_v2.php/"
                  "var%20KLC_ML=/CN_MinlineService.getMinlineData"
              )
              params = {"symbol": symbol, "scale":"30","ma":"no","datalen":"120"}
              headers = {
                  "User-Agent":"Mozilla/5.0",
                  "Referer":"https://finance.sina.com.cn/",
                  "Accept":"*/*",
                  "Connection":"close"
              }
              r = requests.get(url, params=params, headers=headers, timeout=30)
              r.raise_for_status()
              text = r.text
              start = text.find("[")
              end = text.rfind("]")
              if start==-1 or end==-1: raise RuntimeError("新浪接口返回格式异常")
              data=json.loads(text[start:end+1])
              if not data: raise RuntimeError("新浪接口返回空K线")
              rows=[]
              for x in data:
                  rows.append({
                      "时间": x.get("day"),
                      "开盘": x.get("open"),
                      "最高": x.get("high"),
                      "最低": x.get("low"),
                      "收盘": x.get("close"),
                      "成交额": x.get("volume",0)
                  })
              df=pd.DataFrame(rows)
              for col in ["开盘","收盘","最高","最低","成交额"]:
                  df[col]=pd.to_numeric(df[col],errors="coerce")
              df=df.dropna(subset=["收盘","最高","最低"]).tail(90).reset_index(drop=True)
              if len(df)<60: raise RuntimeError(f"{PERIOD_NAME}K线不足60根，当前{len(df)}根")
              return df

          def get_30m_kline_akshare(code):
              df = ak.stock_zh_a_hist_min_em(symbol=str(code).zfill(6), period=PERIOD, adjust="qfq")
              if df is None or df.empty: raise RuntimeError("akshare返回空数据")
              df=df[["时间","开盘","收盘","最高","最低","成交额"]].copy()
              for col in ["开盘","收盘","最高","最低","成交额"]:
                  df[col]=pd.to_numeric(df[col],errors="coerce")
              df=df.dropna(subset=["收盘","最高","最低"]).tail(90).reset_index(drop=True)
              if len(df)<60: raise RuntimeError(f"{PERIOD_NAME}K线不足60根，当前{len(df)}根")
              return df

          def get_30m_kline(code):
              code=str(code).zfill(6)
              errors=[]
              for i in range(3):
                  try:
                      time.sleep(2+i)
                      return get_30m_kline_sina(code)
                  except Exception as e:
                      errors.append(f"新浪第{i+1}次失败：{type(e).__name__}: {e}")
                      print(errors[-1])
                      time.sleep(3+i*2)
              for i in range(3):
                  try:
                      time.sleep(2+i)
                      return get_30m_kline_akshare(code)
                  except Exception as e:
                      errors.append(f"akshare第{i+1}次失败：{type(e).__name__}: {e}")
                      print(errors[-1])
                      time.sleep(3+i*2)
              raise RuntimeError("30分钟K线获取失败："+"；".join(errors[-4:]))

          def near(a,b,tol=0.01): return a>0 and b>0 and abs(a-b)/max(a,b)<=tol

          def analyze(code,name):
              df=get_30m_kline(code)
              current=float(df["收盘"].iloc[-1])
              last_time=str(df["时间"].iloc[-1])
              h5=float(df["最高"].tail(5).max())
              h20=float(df["最高"].tail(20).max())
              h60=float(df["最高"].tail(60).max())
              l2=float(df["最低"].tail(2).min())
              l5=float(df["最低"].tail(5).min())
              amount=float(df["成交额"].iloc[-1]) if "成交额" in df.columns else 0
              A=near(h5,h20) and near(h20,h60)
              B=near(l2,l5)
              D=current>h60*(1+0.003)
              F=current<l5*(1-0.01)
              if F: status="证伪"; reason=f"{PERIOD_NAME}收盘价 {current:.2f} 跌破支撑 {l5:.2f}"
              elif A and B and D: status="突破"; reason=f"{PERIOD_NAME}收盘价 {current:.2f} 突破结构高点 {h60:.2f}"
              elif A and B: status="等待"; reason=f"{PERIOD_NAME}结构有效，等待突破 {h60:.2f}"
              elif A: status="观察"; reason="高点压缩存在，但低点承接不足"
              else: status="未成型"; reason=f"不满足{PERIOD_NAME}K的5/20/60高点重合"
              return {"code":code,"name":name,"status":status,"reason":reason,"price":current,
                      "last_time":last_time,"amount":amount/100000000 if amount else 0,
                      "A":A,"B":B,"D":D,"F":F,"h5":h5,"h20":h20,"h60":h60,"l2":l2,"l5":l5}

          results=[]
          for item in WATCHLIST:
              try: results.append(analyze(item["code"],item["name"]))
              except Exception as e: results.append({"code":item["code"],"name":item["name"],"status":"ERROR","reason":f"{type(e).__name__}: {e}"})

          now=datetime.now(ZoneInfo("Asia/Shanghai")).strftime("%Y-%m-%d %H:%M:%S")
          lines=[]
          lines.append("A股等突破自动扫描")
          lines.append(f"模型周期：{PERIOD_NAME}K")
          lines.append(f"时间：{now}\n")
          lines.append(f"突破：{sum(r['status']=='突破' for r in results)}")
          lines.append(f"等待：{sum(r['status']=='等待' for r in results)}")
          lines.append(f"证伪：{sum(r['status']=='证伪' for r in results)}")
          lines.append(f"观察：{sum(r['status']=='观察' for r in results)}")
          lines.append(f"未成型：{sum(r['status']=='未成型' for r in results)}")
          lines.append(f"错误：{sum(r['status']=='ERROR' for r in results)}\n")

          for r in results:
              lines.append(f"{r['code']} {r['name']}｜{r['status']}")
              lines.append(f"原因：{r['reason']}")
              if "price" in r:
                  lines.append(f"K线时间：{r['last_time']}")
                  lines.append(f"价格：{r['price']:.2f}｜成交额：{r['amount']:.2f}亿")
                  lines.append(f"A高点重合：{r['A']}｜B低点承接：{r['B']}｜D突破：{r['D']}｜证伪：{r['F']}")
                  lines.append(f"5高：{r['h5']:.2f}｜20高：{r['h20']:.2f}｜60高：{r['h60']:.2f}")
                  lines.append(f"2低：{r['l2']:.2f}｜5低：{r['l5']:.2f}")
              lines.append("")

          lines.append("规则：")
          lines.append(f"A：5根{PERIOD_NAME}最高≈20根{PERIOD_NAME}最高≈60根{PERIOD_NAME}最高")
          lines.append(f"B：近2根{PERIOD_NAME}最低≈近5根{PERIOD_NAME}最低")
          lines.append("C：沪深主板 + 创业板 + 科创板，非ST")
          lines.append(f"D：当前{PERIOD_NAME}收盘价突破结构高点\n")
          lines.append("提示：仅用于策略观察，不构成投资建议。")

          print("\n".join(lines))
          PY

          python scan.py > msg_full.txt 2>&1
          CODE=$?

          {
            echo "A股等突破扫描结果"
            echo "退出码：$CODE"
            echo "北京时间：$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            tail -c 3500 msg_full.txt
          } > msg.txt

          echo "===== Telegram Message ====="
          cat msg.txt

          RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$(cat msg.txt)")

          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"ok":true'
