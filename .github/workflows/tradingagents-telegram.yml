name: TradingAgents Telegram Alert

on:
  workflow_dispatch:
  schedule:
    # 北京时间 09:35 = UTC 01:35
    - cron: "35 1 * * 1-5"
    # 北京时间 11:30 = UTC 03:30
    - cron: "30 3 * * 1-5"
    # 北京时间 14:30 = UTC 06:30
    - cron: "30 6 * * 1-5"

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas

      - name: Run breakout scan and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e

          python scripts/breakout_alert.py > msg.txt

          echo "===== Message ====="
          cat msg.txt

          echo "===== Telegram response ====="
          RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$(cat msg.txt)")

          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"ok":true'
